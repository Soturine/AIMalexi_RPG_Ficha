<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Teste FASE 3 · Store Reativo · AIMalexi RPG</title>
  <link rel="stylesheet" href="css/theme.css" />
  <style>
    .test-output {
      font-family: var(--font-mono); font-size: 0.82rem;
      background: var(--bg-deep); padding: 0.8rem; border-radius: var(--radius);
      white-space: pre-wrap; color: var(--ink); border: 1px solid var(--ink-faded);
      max-height: 80vh; overflow-y: auto;
    }
    .test-output .ok  { color: var(--ok); }
    .test-output .err { color: var(--err); font-weight: 700; }
    .status-banner {
      padding: 0.75rem 1rem; border-radius: var(--radius);
      margin-bottom: 1.25rem; font-family: var(--font-mono); font-size: 0.9rem;
    }
    .status-banner.ok  { background: rgba(90,138,90,0.15); color: var(--ok); border-left: 3px solid var(--ok); }
    .status-banner.err { background: rgba(139,26,26,0.2); color: #ffb4b4; border-left: 3px solid var(--err); }
    .section-hdr { margin: 1.25rem 0 0.25rem; color: var(--brass-bright); font-family: var(--font-mono); font-size: 0.78rem; }
  </style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1 class="app-title">🧪 Teste FASE 3 — Store Reativo (M1)</h1>
    <p class="app-subtitle">createSignal · createBus · store.dispatch · bridge state.character</p>
  </header>

  <div id="status" class="status-banner">Carregando…</div>
  <div class="test-output" id="out">—</div>
</div>

<!-- Store M1 (sem engine, sem dados — teste puro de infraestrutura) -->
<script src="js/core/actions.js"></script>
<script src="js/core/signals.js"></script>
<script src="js/core/bus.js"></script>
<script src="js/core/store.js"></script>

<script>
"use strict";

// ─── Runner mínimo ─────────────────────────────────────────────────────────
const out = document.getElementById("out");
let passed = 0, failed = 0, sectionLabel = "";

function section(label) {
  sectionLabel = label;
  out.insertAdjacentHTML("beforeend",
    `<div class="section-hdr">── ${label}</div>`);
}

function check(label, ok, got, expected) {
  passed += ok ? 1 : 0;
  failed += ok ? 0 : 1;
  const line = document.createElement("div");
  if (ok) {
    line.className = "ok";
    line.textContent = `  ✓ ${label}`;
  } else {
    line.className = "err";
    line.textContent = `  ✗ ${label}  got=${JSON.stringify(got)}  expected=${JSON.stringify(expected)}`;
  }
  out.appendChild(line);
}

function eq(label, got, expected) {
  check(label, got === expected, got, expected);
}

function deepEq(label, got, expected) {
  check(label, JSON.stringify(got) === JSON.stringify(expected), got, expected);
}

function notNull(label, got) {
  check(label, got != null, got, "non-null");
}

// ─── Fixture de personagem mínimo ─────────────────────────────────────────
function makeChar(overrides) {
  return Object.assign({
    id: null,
    attributes: {
      Sorte: { value: 60 }
    },
    derived: {
      PV:  { value: 10, current: 10 },
      PM:  { value: 12, current: 12 },
      SAN: { value: 60, current: 60, max: 99 },
    },
    status: {}
  }, overrides);
}

// ══════════════════════════════════════════════════════════════════════════════
// 1. createSignal
// ══════════════════════════════════════════════════════════════════════════════
section("createSignal — get / set / subscribe / unsubscribe");

(function testSignal() {
  const s = window.CoC.createSignal(0);

  eq("get() retorna valor inicial", s.get(), 0);

  s.set(5);
  eq("set(5) atualiza valor", s.get(), 5);

  // set com mesmo valor não deve notificar
  let notifCount = 0;
  const unsub = s.subscribe(() => notifCount++);
  s.set(5);  // mesmo valor → sem notificação
  eq("set(mesmo valor) não notifica", notifCount, 0);

  s.set(10);
  eq("set(novo valor) notifica 1x", notifCount, 1);
  eq("get() após notificação retorna novo valor", s.get(), 10);

  unsub();
  s.set(99);
  eq("unsubscribe cancela notificações", notifCount, 1);
  eq("get() continua funcionando após unsub", s.get(), 99);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 2. createBus
// ══════════════════════════════════════════════════════════════════════════════
section("createBus — publish / subscribe / unsubscribe / clear");

(function testBus() {
  const bus = window.CoC.bus;

  let received = [];
  const unsub = bus.subscribe("test:event", d => received.push(d));

  bus.publish("test:event", { x: 1 });
  bus.publish("test:event", { x: 2 });
  eq("publish entrega 2 eventos", received.length, 2);
  eq("payload do primeiro evento", received[0].x, 1);

  unsub();
  bus.publish("test:event", { x: 3 });
  eq("unsubscribe cancela recebimento", received.length, 2);

  // clear
  let n = 0;
  bus.subscribe("test:clear", () => n++);
  bus.clear("test:clear");
  bus.publish("test:clear", {});
  eq("clear(canal) remove todos listeners do canal", n, 0);

  // canal inexistente não explode
  bus.publish("inexistente", {});
  check("publish em canal sem subscribers não lança erro", true, true, true);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 3. store — SET_CHARACTER / getState / subscribe
// ══════════════════════════════════════════════════════════════════════════════
section("store — SET_CHARACTER / getState / subscribe");

(function testSetCharacter() {
  const st = window.CoC.store;

  eq("getState().character inicial é null", st.getState().character, null);

  const char = makeChar({ id: "abc" });
  st.dispatch({ type: "SET_CHARACTER", payload: char });

  notNull("após SET_CHARACTER, character não é null", st.getState().character);
  eq("id preservado após SET_CHARACTER", st.getState().character.id, "abc");
  eq("PV.current preservado", st.getState().character.derived.PV.current, 10);

  // Imutabilidade: o payload original não é a mesma referência
  check("SET_CHARACTER faz deepClone (referência diferente)",
    st.getState().character !== char, true, true);

  // subscribe
  let notifs = 0;
  const unsub = st.subscribe(() => notifs++);
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar() });
  eq("subscribe recebe notificação em SET_CHARACTER", notifs, 1);
  unsub();
})();

// ══════════════════════════════════════════════════════════════════════════════
// 4. store — APPLY_DAMAGE / HEAL_DAMAGE
// ══════════════════════════════════════════════════════════════════════════════
section("store — APPLY_DAMAGE / HEAL_DAMAGE (PV)");

(function testPV() {
  const st = window.CoC.store;
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar() });

  // Dano normal
  st.dispatch({ type: "APPLY_DAMAGE", payload: { amount: 3 } });
  eq("APPLY_DAMAGE -3 → PV.current = 7", st.getState().character.derived.PV.current, 7);

  // Dano que levaria abaixo do cap (-2)
  st.dispatch({ type: "APPLY_DAMAGE", payload: { amount: 15 } });
  eq("APPLY_DAMAGE clampa no PV_MIN (-2)", st.getState().character.derived.PV.current, -2);

  // Cura não ultrapassa PV máximo
  st.dispatch({ type: "HEAL_DAMAGE", payload: { amount: 20 } });
  eq("HEAL_DAMAGE clampa no PV.value (10)", st.getState().character.derived.PV.current, 10);

  // Cura parcial
  st.dispatch({ type: "APPLY_DAMAGE", payload: { amount: 6 } });
  st.dispatch({ type: "HEAL_DAMAGE", payload: { amount: 4 } });
  eq("HEAL_DAMAGE parcial: 4 - 6 + 4 = 8 → PV.current = 8", st.getState().character.derived.PV.current, 8);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 5. store — LOSE_SANITY / RECOVER_SANITY
// ══════════════════════════════════════════════════════════════════════════════
section("store — LOSE_SANITY / RECOVER_SANITY (SAN + sanLossesToday)");

(function testSAN() {
  const st = window.CoC.store;
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar() });

  // Perda pequena (≤ 4) — não rastreia sanLossesToday
  st.dispatch({ type: "LOSE_SANITY", payload: { amount: 3 } });
  eq("LOSE_SANITY -3 → SAN.current = 57", st.getState().character.derived.SAN.current, 57);
  eq("perda ≤4 não incrementa sanLossesToday", st.getState().character.status.sanLossesToday || 0, 0);

  // Perda grande (> 4) — rastreia sanLossesToday
  st.dispatch({ type: "LOSE_SANITY", payload: { amount: 6 } });
  eq("LOSE_SANITY -6 → SAN.current = 51", st.getState().character.derived.SAN.current, 51);
  eq("perda >4 incrementa sanLossesToday = 6", st.getState().character.status.sanLossesToday, 6);

  // Segunda perda grande — acumula
  st.dispatch({ type: "LOSE_SANITY", payload: { amount: 8 } });
  eq("segunda perda >4 acumula sanLossesToday = 14", st.getState().character.status.sanLossesToday, 14);

  // Não vai abaixo de 0
  st.dispatch({ type: "LOSE_SANITY", payload: { amount: 100 } });
  eq("LOSE_SANITY clampa em 0", st.getState().character.derived.SAN.current, 0);

  // Recuperação não ultrapassa max (99)
  st.dispatch({ type: "RECOVER_SANITY", payload: { amount: 200 } });
  eq("RECOVER_SANITY clampa em SAN.max (99)", st.getState().character.derived.SAN.current, 99);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 6. store — SPEND_MAGIC / RESTORE_MAGIC
// ══════════════════════════════════════════════════════════════════════════════
section("store — SPEND_MAGIC / RESTORE_MAGIC (PM)");

(function testPM() {
  const st = window.CoC.store;
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar() });

  st.dispatch({ type: "SPEND_MAGIC", payload: { amount: 4 } });
  eq("SPEND_MAGIC -4 → PM.current = 8", st.getState().character.derived.PM.current, 8);

  st.dispatch({ type: "SPEND_MAGIC", payload: { amount: 20 } });
  eq("SPEND_MAGIC clampa em 0", st.getState().character.derived.PM.current, 0);

  st.dispatch({ type: "RESTORE_MAGIC", payload: { amount: 5 } });
  eq("RESTORE_MAGIC +5 → PM.current = 5", st.getState().character.derived.PM.current, 5);

  st.dispatch({ type: "RESTORE_MAGIC", payload: { amount: 100 } });
  eq("RESTORE_MAGIC clampa em PM.value (12)", st.getState().character.derived.PM.current, 12);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 7. store — SPEND_LUCK
// ══════════════════════════════════════════════════════════════════════════════
section("store — SPEND_LUCK (Sorte)");

(function testLuck() {
  const st = window.CoC.store;
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar() });

  st.dispatch({ type: "SPEND_LUCK", payload: { amount: 10 } });
  eq("SPEND_LUCK -10 → Sorte.value = 50", st.getState().character.attributes.Sorte.value, 50);

  st.dispatch({ type: "SPEND_LUCK", payload: { amount: 100 } });
  eq("SPEND_LUCK clampa em 0", st.getState().character.attributes.Sorte.value, 0);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 8. store — SET_CHARACTER_ID
// ══════════════════════════════════════════════════════════════════════════════
section("store — SET_CHARACTER_ID");

(function testSetId() {
  const st = window.CoC.store;
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar({ id: null }) });

  eq("id inicial é null", st.getState().character.id, null);

  st.dispatch({ type: "SET_CHARACTER_ID", payload: "uuid-123" });
  eq("SET_CHARACTER_ID atualiza id", st.getState().character.id, "uuid-123");
  eq("PV.current inalterado após SET_CHARACTER_ID", st.getState().character.derived.PV.current, 10);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 9. Imutabilidade — referências antigas não são mutadas
// ══════════════════════════════════════════════════════════════════════════════
section("Imutabilidade — referências anteriores preservadas");

(function testImmutability() {
  const st = window.CoC.store;
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar() });

  const snap1 = st.getState();
  const char1 = snap1.character;

  st.dispatch({ type: "APPLY_DAMAGE", payload: { amount: 3 } });

  const snap2 = st.getState();
  // Estados diferentes
  check("dispatch cria novo objeto de estado", snap1 !== snap2, true, true);
  check("dispatch cria novo objeto de character", char1 !== snap2.character, true, true);
  // Estado anterior não foi mutado
  eq("estado anterior: PV.current inalterado = 10", char1.derived.PV.current, 10);
  eq("estado novo: PV.current = 7", snap2.character.derived.PV.current, 7);
})();

// ══════════════════════════════════════════════════════════════════════════════
// 10. actions.js — TYPES e creators incluem SET_CHARACTER
// ══════════════════════════════════════════════════════════════════════════════
section("actions.js — novos tipos SET_CHARACTER / SET_CHARACTER_ID");

(function testActions() {
  const a = window.CoC.actions;
  eq("TYPES.SET_CHARACTER definido", a.TYPES.SET_CHARACTER, "SET_CHARACTER");
  eq("TYPES.SET_CHARACTER_ID definido", a.TYPES.SET_CHARACTER_ID, "SET_CHARACTER_ID");

  const char = makeChar({ id: "x" });
  const act = a.setCharacter(char);
  eq("setCharacter() cria action correta", act.type, "SET_CHARACTER");
  deepEq("setCharacter() payload = character", act.payload, char);

  const actId = a.setCharacterId("uid-42");
  eq("setCharacterId() cria action correta", actId.type, "SET_CHARACTER_ID");
  eq("setCharacterId() payload = id", actId.payload, "uid-42");
})();

// ══════════════════════════════════════════════════════════════════════════════
// 11. store — ação desconhecida não muta estado
// ══════════════════════════════════════════════════════════════════════════════
section("store — ação desconhecida preserva estado");

(function testUnknown() {
  const st = window.CoC.store;
  st.dispatch({ type: "SET_CHARACTER", payload: makeChar() });
  const before = st.getState();

  // dispatch uma action que o reducer não conhece
  st.dispatch({ type: "ACAO_FANTASMA", payload: {} });

  // O estado deve ser o mesmo objeto (sem mudança)
  check("ação desconhecida retorna mesmo estado (sem re-render)", st.getState() === before, true, true);
})();

// ══════════════════════════════════════════════════════════════════════════════
// Resultado final
// ══════════════════════════════════════════════════════════════════════════════
const banner = document.getElementById("status");
const total = passed + failed;
if (failed === 0) {
  banner.className = "status-banner ok";
  banner.textContent = `✅ ${passed}/${total} testes passaram — FASE 3 store M1 OK`;
} else {
  banner.className = "status-banner err";
  banner.textContent = `❌ ${failed} falhas em ${total} testes — verifique o output abaixo`;
}
</script>
</body>
</html>
