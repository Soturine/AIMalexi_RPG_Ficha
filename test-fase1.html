<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Teste FASE 1 · CoC 7e · AIMalexi RPG</title>
  <link rel="stylesheet" href="css/theme.css" />
  <style>
    .test-output {
      font-family: var(--font-mono); font-size: 0.82rem;
      background: var(--bg-deep); padding: 0.8rem; border-radius: var(--radius);
      white-space: pre-wrap; color: var(--ink); border: 1px solid var(--ink-faded);
      max-height: 80vh; overflow-y: auto;
    }
    .test-output .ok  { color: var(--ok); }
    .test-output .err { color: var(--err); font-weight: 700; }
    .status-banner {
      padding: 0.75rem 1rem; border-radius: var(--radius);
      margin-bottom: 1.25rem; font-family: var(--font-mono); font-size: 0.9rem;
    }
    .status-banner.ok  { background: rgba(90,138,90,0.15); color: var(--ok); border-left: 3px solid var(--ok); }
    .status-banner.err { background: rgba(139,26,26,0.2); color: #ffb4b4; border-left: 3px solid var(--err); }
    .section-hdr { margin: 1.25rem 0 0.25rem; color: var(--brass-bright); font-family: var(--font-mono); font-size: 0.78rem; }
  </style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1 class="app-title">🧪 Teste FASE 1 — Safety Net</h1>
    <p class="app-subtitle">BUG-01 · BUG-02 · BUG-03 — Integridade de Regras CoC 7e</p>
  </header>

  <div id="status" class="status-banner">Carregando…</div>
  <div class="test-output" id="out">—</div>
</div>

<!-- Dados -->
<script src="data/damage-bonus-table.js"></script>
<script src="data/skills.js"></script>
<script src="data/occupations.js"></script>

<!-- Engine -->
<script src="js/engine/dice.js"></script>
<script src="js/engine/coc7e-rules.js"></script>
<script src="js/engine/storage.js"></script>
<script src="js/shared/validators.js"></script>

<script>
"use strict";

// ─── Runner ────────────────────────────────────────────────────────────────
const results = [];
let section = "";

function sec(label) {
  section = label;
  results.push({ section: true, label });
}

function check(name, cond, detail) {
  results.push({ name: `[${section}] ${name}`, pass: !!cond, detail: detail || "" });
}

function eq(name, got, expected) {
  const pass = JSON.stringify(got) === JSON.stringify(expected);
  results.push({
    name: `[${section}] ${name}`,
    pass,
    detail: pass ? "" : `esperado ${JSON.stringify(expected)}, obteve ${JSON.stringify(got)}`
  });
}

// ─── Render ────────────────────────────────────────────────────────────────
function render() {
  const lines = results.map(r => {
    if (r.section) return `\n── ${r.label} ──`;
    const icon = r.pass ? `<span class="ok">✓</span>` : `<span class="err">✗</span>`;
    const detail = r.detail ? `  <span class="err">→ ${r.detail}</span>` : "";
    return `${icon} ${r.name}${detail}`;
  });
  document.getElementById("out").innerHTML = lines.join("\n");

  const passed = results.filter(r => !r.section && r.pass).length;
  const failed  = results.filter(r => !r.section && !r.pass).length;
  const banner = document.getElementById("status");
  if (failed === 0) {
    banner.className = "status-banner ok";
    banner.textContent = `✓ TODOS OS ${passed} TESTES PASSARAM`;
  } else {
    banner.className = "status-banner err";
    banner.textContent = `✗ ${failed} FALHOU de ${passed + failed} — veja detalhes abaixo`;
  }
}

// ─── Testes ────────────────────────────────────────────────────────────────
async function run() {
  const R = window.CoC.rules;
  const D = window.CoC.dice;
  const S = window.CoC.storage;
  const V = window.CoC.validators;

  if (S.ready) { try { await S.ready; } catch (e) {} }

  // ══════════════════════════════════════════════════════════════════════════
  // BUG-01: validateCharacter() deve estar exposta e funcional
  // ══════════════════════════════════════════════════════════════════════════
  sec("BUG-01 — validateCharacter conectado");

  check("rules.validateCharacter exportada", typeof R.validateCharacter === "function");
  check("validators.validateCharacter exportada", typeof V.validateCharacter === "function");

  // Personagem limpo: deve ser válido, sem issues
  const clean = { skills: [], attributes: { FOR: { value: 50 }, CON: { value: 60 } } };
  const rClean = R.validateCharacter(clean);
  check("personagem limpo: valid=true", rClean.valid === true);
  eq("personagem limpo: sem issues", rClean.issues.length, 0);

  // Perícia acima do cap absoluto (>90%): deve gerar issue
  const overCap = { skills: [{ name: "Ocultismo", value: 95 }], attributes: {} };
  const rOver = R.validateCharacter(overCap);
  check("skill 95% → issue (cap absoluto 90%)", rOver.issues.length > 0);
  check("skill 95% → valid=false", rOver.valid === false);

  // Perícia em 75%: sem issue, sem warning de cap
  const atCap = { skills: [{ name: "Ocultismo", value: 75 }], attributes: {} };
  const rAt = R.validateCharacter(atCap);
  check("skill 75%: sem issue (exatamente no cap)", rAt.issues.length === 0);

  // Perícia em 80% (acima do padrão mas abaixo do absoluto): warning, não issue
  const aboveSoft = { skills: [{ name: "Ocultismo", value: 80 }], attributes: {} };
  const rSoft = R.validateCharacter(aboveSoft);
  check("skill 80%: sem issue (abaixo do cap absoluto)", rSoft.issues.length === 0);
  check("skill 80%: gera warning (acima do cap padrão)", rSoft.warnings.length > 0);

  // Atributo fora de faixa (>90): gera warning
  const outRange = { skills: [], attributes: { FOR: { value: 95 } } };
  const rRange = R.validateCharacter(outRange);
  check("atributo 95: gera warning (fora de 15-90)", rRange.warnings.length > 0);

  // Atributo normal: sem warning de range
  const inRange = { skills: [], attributes: { FOR: { value: 70 } } };
  const rIn = R.validateCharacter(inRange);
  check("atributo 70: sem warning de range", rIn.warnings.length === 0);

  // validators wrapper também funciona
  const rWrapper = V.validateCharacter({ skills: [], attributes: {}, investigator: { name: "", occupation: "Médico" } });
  check("validators wrapper: gera warning de nome vazio", rWrapper.warnings.some(w => w.includes("nome")));

  // ══════════════════════════════════════════════════════════════════════════
  // BUG-02: calcAgeAdjustments — todos os brackets
  // ══════════════════════════════════════════════════════════════════════════
  sec("BUG-02 — calcAgeAdjustments brackets");

  check("calcAgeAdjustments exportada", typeof R.calcAgeAdjustments === "function");

  // Faixas sem ajuste
  check("age 14: null (abaixo dos jovens)", R.calcAgeAdjustments(14) === null);
  check("age 20: null (adulto jovem)", R.calcAgeAdjustments(20) === null);
  check("age 30: null (meia-idade inicial)", R.calcAgeAdjustments(30) === null);
  check("age 39: null (limite antes do 40)", R.calcAgeAdjustments(39) === null);

  // Jovens (15-19): -5 em FOR/CON/DES
  const a15 = R.calcAgeAdjustments(15);
  check("age 15: totalReduction=5", a15?.totalReduction === 5);
  eq("age 15: attrs=[FOR,CON,DES]", a15?.attrs, ["FOR", "CON", "DES"]);

  const a19 = R.calcAgeAdjustments(19);
  check("age 19 (edge): totalReduction=5", a19?.totalReduction === 5);
  eq("age 19: attrs=[FOR,CON,DES]", a19?.attrs, ["FOR", "CON", "DES"]);

  // 40-49: -5 em FOR/CON/DES/APA
  const a40 = R.calcAgeAdjustments(40);
  check("age 40: totalReduction=5", a40?.totalReduction === 5);
  eq("age 40: attrs inclui APA", a40?.attrs, ["FOR", "CON", "DES", "APA"]);

  const a49 = R.calcAgeAdjustments(49);
  check("age 49 (edge): totalReduction=5", a49?.totalReduction === 5);

  // 50-59: -10
  check("age 50: totalReduction=10", R.calcAgeAdjustments(50)?.totalReduction === 10);
  check("age 59: totalReduction=10", R.calcAgeAdjustments(59)?.totalReduction === 10);

  // 60-69: -20
  check("age 60: totalReduction=20", R.calcAgeAdjustments(60)?.totalReduction === 20);

  // 70-79: -40
  check("age 70: totalReduction=40", R.calcAgeAdjustments(70)?.totalReduction === 40);

  // 80+: -80
  check("age 80: totalReduction=80", R.calcAgeAdjustments(80)?.totalReduction === 80);
  check("age 85: totalReduction=80", R.calcAgeAdjustments(85)?.totalReduction === 80);

  // ══════════════════════════════════════════════════════════════════════════
  // BUG-02: calcMOV age adjustments (já existia, mas garante não regrediu)
  // ══════════════════════════════════════════════════════════════════════════
  sec("BUG-02 — calcMOV por idade (regressão)");

  // Base: FOR=DES=60 > TAM=50 → MOV 9 (ambos maiores)
  eq("calcMOV: ambos > TAM → base 9", R.calcMOV(60, 60, 50, 25), 9);
  // FOR < TAM, DES < TAM → MOV 7
  eq("calcMOV: ambos < TAM → base 7", R.calcMOV(40, 40, 70, 25), 7);
  // Apenas um >= TAM → MOV 8
  eq("calcMOV: FOR>TAM, DES<TAM → base 8", R.calcMOV(70, 40, 60, 25), 8);

  // Penalidades de idade (base 9 = 60,60,50)
  eq("calcMOV: age 40 → -1 (9→8)", R.calcMOV(60, 60, 50, 40), 8);
  eq("calcMOV: age 50 → -2 (9→7)", R.calcMOV(60, 60, 50, 50), 7);
  eq("calcMOV: age 60 → -3 (9→6)", R.calcMOV(60, 60, 50, 60), 6);
  eq("calcMOV: age 70 → -4 (9→5)", R.calcMOV(60, 60, 50, 70), 5);
  eq("calcMOV: age 80 → -5 (9→4)", R.calcMOV(60, 60, 50, 80), 4);

  // Mínimo absoluto = 1 (mesmo com base 7 e age 80 → 7-5=2, não pode ir abaixo de 1)
  check("calcMOV: nunca abaixo de 1", R.calcMOV(40, 40, 70, 80) >= 1);
  eq("calcMOV: base 7, age 80 → 2 (não 1)", R.calcMOV(40, 40, 70, 80), 2);

  // ══════════════════════════════════════════════════════════════════════════
  // BUG-03: dice.rollAttribute (base para o re-roll de Sorte)
  // ══════════════════════════════════════════════════════════════════════════
  sec("BUG-03 — dice.rollAttribute (base do re-roll de Sorte)");

  // Valida que rollAttribute retorna a estrutura esperada e valores na faixa
  const attrResult = D.rollAttribute("3d6x5");
  check("rollAttribute retorna { total, raw, rawSum, formula }",
    typeof attrResult.total === "number" && Array.isArray(attrResult.raw) && typeof attrResult.rawSum === "number");
  check("rollAttribute 3d6x5: total em [15, 90]",
    attrResult.total >= 15 && attrResult.total <= 90, `obteve ${attrResult.total}`);
  check("rollAttribute 3d6x5: raw tem 3 valores", attrResult.raw.length === 3);
  check("rollAttribute 3d6x5: rawSum === soma dos dados",
    attrResult.rawSum === attrResult.raw.reduce((a, b) => a + b, 0));
  eq("rollAttribute 3d6x5: total = rawSum * 5", attrResult.total, attrResult.rawSum * 5);

  // 100 rolagens: nenhuma fora de [15, 90]
  let outOfRange = 0;
  for (let i = 0; i < 100; i++) {
    const r = D.rollAttribute("3d6x5");
    if (r.total < 15 || r.total > 90) outOfRange++;
  }
  eq("rollAttribute 3d6x5: 100 rolagens todas em [15, 90]", outOfRange, 0);

  // 2d6+6x5: faixa [40, 90]
  const attr2d6 = D.rollAttribute("2d6+6x5");
  check("rollAttribute 2d6+6x5: total em [40, 90]",
    attr2d6.total >= 40 && attr2d6.total <= 90, `obteve ${attr2d6.total}`);

  // Simulação do re-roll: dadas 2 rolagens, deve usar o maior
  // (não podemos testar o investigator.js diretamente, mas testamos a lógica base)
  const r1 = D.rollAttribute("3d6x5");
  const r2 = D.rollAttribute("3d6x5");
  const best = r1.total >= r2.total ? r1.total : r2.total;
  check("lógica re-roll: max(r1, r2) >= cada uma das duas",
    best >= r1.total && best >= r2.total);

  // ══════════════════════════════════════════════════════════════════════════
  // Regressão: calcHP, calcMP, calcSAN, calcDB (não deve ter regredido)
  // ══════════════════════════════════════════════════════════════════════════
  sec("Regressão — calcHP / calcMP / calcSAN / calcDB");

  eq("calcHP(60, 70) = 13", R.calcHP(60, 70), 13);
  eq("calcHP(50, 50) = 10", R.calcHP(50, 50), 10);
  eq("calcHP(CON=0, TAM=0) = 0", R.calcHP(0, 0), 0);

  eq("calcMP(50) = 10", R.calcMP(50), 10);
  eq("calcMP(55) = 11", R.calcMP(55), 11);
  eq("calcMP(0) = 0", R.calcMP(0), 0);

  eq("calcSANInit(60) = 60", R.calcSANInit(60), 60);
  eq("calcSANMax(0) = 99", R.calcSANMax(0), 99);
  eq("calcSANMax(30) = 69", R.calcSANMax(30), 69);

  eq("calcDodgeBase(60) = 30", R.calcDodgeBase(60), 30);
  eq("calcOwnLanguageBase(75) = 75", R.calcOwnLanguageBase(75), 75);

  // DB lookup via lookupDB direto (não via calcDB que depende de window.CoCData)
  const db50  = window.CoCData.lookupDB(50);
  const db120 = window.CoCData.lookupDB(120);
  const db130 = window.CoCData.lookupDB(130);
  const db200 = window.CoCData.lookupDB(200);
  eq("DB FOR+TAM=50 → '-2', build -2", JSON.stringify(db50),  JSON.stringify({ db: "-2", build: -2 }));
  eq("DB FOR+TAM=120 → '0', build 0", JSON.stringify(db120), JSON.stringify({ db: "0",  build:  0 }));
  eq("DB FOR+TAM=130 → '+1D4', build 1", JSON.stringify(db130), JSON.stringify({ db: "+1D4", build: 1 }));
  eq("DB FOR+TAM=200 → '+1D6', build 2", JSON.stringify(db200), JSON.stringify({ db: "+1D6", build: 2 }));

  render();
}

document.addEventListener("DOMContentLoaded", () => {
  run().catch(e => {
    document.getElementById("status").className = "status-banner err";
    document.getElementById("status").textContent = "ERRO FATAL: " + e.message;
    console.error(e);
  });
});
</script>
</body>
</html>
