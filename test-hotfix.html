<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Teste do Hotfix · AIMalexi RPG</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/investigator.css" />
  <style>
    .test-output {
      font-family: var(--font-mono); font-size: 0.82rem;
      background: var(--bg-deep); padding: 0.8rem; border-radius: var(--radius);
      white-space: pre-wrap; color: var(--ink); border: 1px solid var(--ink-faded);
      max-height: 70vh; overflow-y: auto;
    }
    .test-output .ok  { color: var(--ok); }
    .test-output .err { color: var(--err); font-weight: 700; }
    .status-banner { padding: 0.75rem 1rem; border-radius: var(--radius); margin-bottom: 1.25rem; font-family: var(--font-mono); }
    .status-banner.ok  { background: rgba(90,138,90,0.15); color: var(--ok); border-left: 3px solid var(--ok); }
    .status-banner.err { background: rgba(139,26,26,0.2); color: #ffb4b4; border-left: 3px solid var(--err); }
    .preview-actions { display:flex; gap:.5rem; flex-wrap:wrap; margin: 1rem 0; }
  </style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1 class="app-title">🧪 Teste do Hotfix</h1>
    <p class="app-subtitle">Ocupação · SAN FX · Persistência · Migração</p>
  </header>

  <div id="status" class="status-banner">Carregando…</div>
  <div class="test-output" id="out">—</div>

  <div class="preview-actions">
    <button onclick="window.CoC.sanityFx.init(); document.body.setAttribute('data-sanity','2')">Preview SAN nível 2</button>
    <button onclick="document.body.setAttribute('data-sanity','3')">nível 3</button>
    <button onclick="document.body.setAttribute('data-sanity','4')">nível 4</button>
    <button onclick="document.body.setAttribute('data-sanity','0')">limpar</button>
    <button onclick="window.CoC.sanityFx.openSettings()">Abrir config de efeitos</button>
  </div>
  <p class="dim" style="font-size:.85rem;">Os botões acima permitem inspecionar visualmente os efeitos de insanidade neste mesmo container (.app).</p>
</div>

<!-- Dados + engine -->
<script src="data/skills.js"></script>
<script src="data/occupations.js"></script>
<script src="data/damage-bonus-table.js"></script>
<script src="js/engine/dice.js"></script>
<script src="js/engine/coc7e-rules.js"></script>
<script src="js/engine/storage.js"></script>
<script src="js/shared/ui-components.js"></script>
<script src="js/shared/sanity-fx.js"></script>

<script>
  const out = (txt) => document.getElementById('out').innerHTML = txt;
  const span = (t, c) => `<span class="${c}">${t}</span>`;

  const results = [];
  function check(name, cond, detail = "") {
    results.push({ name, pass: !!cond, detail });
  }
  function eq(name, got, expected) {
    const pass = JSON.stringify(got) === JSON.stringify(expected);
    results.push({ name, pass, detail: pass ? "" : `esperado ${JSON.stringify(expected)}, obteve ${JSON.stringify(got)}` });
  }

  async function run() {
    const R = window.CoC.rules;
    const S = window.CoC.storage;
    const FX = window.CoC.sanityFx;

    if (S.ready) { try { await S.ready; } catch (e) {} }

    // ── 1. buildOccupationContext — OCUPAÇÃO PERSONALIZADA (o bug) ──
    const custom = window.CoCData.findOccupation("Personalizada (defina suas perícias)");
    check("Ocupação Personalizada existe", !!custom);
    const charCustom = { investigator: { occupation: custom?.name }, occupationSkills: ["Lutar (Espada)", "Ocultismo"] };
    const ctxC = R.buildOccupationContext(custom, charCustom);
    eq("custom: mandatory vazio", ctxC.mandatory.size, 0);
    eq("custom: freeBudget = 8", ctxC.freeBudget, 8);
    eq("custom: freeUsed = 2", ctxC.freeUsed, 2);
    check("custom: effective inclui 'Lutar (Espada)'", ctxC.effective.has("Lutar (Espada)"));
    check("custom: effective inclui 'Ocultismo'", ctxC.effective.has("Ocultismo"));

    // Simula o cálculo de gasto como o investigator.js faz (perícia custom designada
    // DEVE cair no pool da ocupação, não no de interesse). Era exatamente o que quebrava.
    const skillsState = { "Lutar (Espada)": { value: 70 }, "Ocultismo": { value: 50 }, "Psicologia": { value: 40 } };
    const baseOf = (name) => { const d = window.CoCData.findSkill(name) || window.CoCData.findSkill(name.replace(/\s*\(.+\)$/, "")); return d ? (Number(d.base)||0) : 0; };
    let occSpent = 0, piSpent = 0;
    for (const [n, sk] of Object.entries(skillsState)) {
      const spent = Math.max(0, (Number(sk.value)||0) - baseOf(n));
      if (spent <= 0) continue;
      if (ctxC.effective.has(n)) occSpent += spent; else piSpent += spent;
    }
    check("custom: pontos das perícias designadas caem na OCUPAÇÃO (occSpent>0)", occSpent > 0, `occSpent=${occSpent}, piSpent=${piSpent}`);
    check("custom: 'Psicologia' (não designada) cai no Interesse", piSpent > 0, `piSpent=${piSpent}`);

    // ── 2. buildOccupationContext — OCUPAÇÃO NATIVA com perícias livres ──
    const medico = window.CoCData.findOccupation("Médico");
    check("Médico existe", !!medico);
    const ctxM = R.buildOccupationContext(medico, { occupationSkills: ["Encontrar", "Medicina"] });
    check("nativa: mandatory inclui 'Medicina'", ctxM.mandatory.has("Medicina"));
    check("nativa: 'Encontrar' designada entra em chosen", ctxM.chosen.has("Encontrar"));
    check("nativa: 'Medicina' (já obrigatória) NÃO duplica em chosen", !ctxM.chosen.has("Medicina"));
    check("nativa: effective tem obrigatória + livre", ctxM.effective.has("Medicina") && ctxM.effective.has("Encontrar"));

    // ── 3. "A | B" (Soldado: 'Escalar | Nadar') — ambas elegíveis ──
    const soldado = window.CoCData.findOccupation("Soldado");
    const ctxS = R.buildOccupationContext(soldado, {});
    check("Soldado: 'Escalar' e 'Nadar' ambas obrigatórias (escolha lenient)", ctxS.mandatory.has("Escalar") && ctxS.mandatory.has("Nadar"));

    // ── 4. occ null ──
    const ctxN = R.buildOccupationContext(null, {});
    eq("null occ: mandatory vazio", ctxN.mandatory.size, 0);
    eq("null occ: freeBudget 0", ctxN.freeBudget, 0);

    // ── 5. sanityFx.ratioToLevel — limiares ──
    eq("SAN ratio 0.60 → nível 0", FX.ratioToLevel(0.60), 0);
    eq("SAN ratio 0.49 → nível 1", FX.ratioToLevel(0.49), 1);
    eq("SAN ratio 0.29 → nível 2", FX.ratioToLevel(0.29), 2);
    eq("SAN ratio 0.14 → nível 3", FX.ratioToLevel(0.14), 3);
    eq("SAN ratio 0.04 → nível 4", FX.ratioToLevel(0.04), 4);
    eq("SAN ratio 1.0 (cheia) → nível 0", FX.ratioToLevel(1.0), 0);

    // ── 6. Persistência: prefs round-trip ──
    S.setPref("sanityFxMode", "reduced");
    eq("prefs: round-trip", S.getPref("sanityFxMode"), "reduced");
    eq("prefs: fallback p/ chave ausente", S.getPref("__nao_existe__", "padrao"), "padrao");

    // ── 7. Migração de schema (v1→v2: occupationSkills) ──
    eq("SAVE_SCHEMA_VERSION == 2", S.SAVE_SCHEMA_VERSION, 2);
    const legacy = { investigator: { name: "Velho" }, skills: {} };
    S.runMigrations(legacy);
    eq("migração: _schemaVersion = 2", legacy._schemaVersion, 2);
    check("migração: occupationSkills inicializado", Array.isArray(legacy.occupationSkills));
    check("migração: não quebra com null", S.runMigrations(null) === null);
    check("migração: não quebra com não-objeto", S.runMigrations("x") === "x");

    // ── 8. Backup-fantasma ──
    const ghostId = S.saveCharacter({ investigator: { name: "Fantasma QA", occupation: "Médico" }, attributes: {}, occupationSkills: [] });
    const ghost = S.getGhost();
    check("ghost: snapshot do último salvo existe", !!ghost && ghost.investigator?.name === "Fantasma QA", ghost ? ghost.investigator?.name : "null");
    S.deleteCharacter(ghostId); // limpeza

    // ── 9. APIs de resiliência expostas ──
    check("API: forceFlush existe", typeof S.forceFlush === "function");
    check("API: onError existe", typeof S.onError === "function");
    check("API: getCorruptedEntries existe", typeof S.getCorruptedEntries === "function");

    // ── Render ──
    const pass = results.filter(r => r.pass).length;
    const fail = results.length - pass;
    const lines = results.map(r =>
      r.pass ? span("✓ " + r.name, "ok")
             : span("✗ " + r.name + (r.detail ? "  → " + r.detail : ""), "err")
    );
    out(lines.join("\n"));
    const banner = document.getElementById('status');
    if (fail === 0) { banner.className = "status-banner ok"; banner.textContent = `✓ TODOS OS ${pass} TESTES PASSARAM · backend de storage: ${S.backend}`; }
    else { banner.className = "status-banner err"; banner.textContent = `✗ ${fail} de ${results.length} FALHARAM (${pass} ok) · backend: ${S.backend}`; }
  }

  document.addEventListener('DOMContentLoaded', () => { run().catch(e => { document.getElementById('status').className="status-banner err"; document.getElementById('status').textContent = "ERRO FATAL: " + e.message; console.error(e); }); });
</script>
</body>
</html>
